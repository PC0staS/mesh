name: mesh
base: core24
version: "1.0.7"
summary: MESH - Uptime Monitor Daemon
description: |
  MESH is a lightweight uptime monitoring daemon with TUI.
  Monitor servers with TCP, HTTP, SSH, and ping checks.

grade: stable
confinement: strict

parts:
  mesh:
    plugin: go
    source: .
    build-snaps:
      - go

apps:
  mesh:
    command: bin/mesh
    plugs:
      - network
      - home

  daemon:
    command: bin/mesh start
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - home
      - system-observe
